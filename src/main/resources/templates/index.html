<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-4">
        <!-- Mensajes de éxito/error -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="mb-0"><i class="fas fa-users"></i> Gestión de Usuarios</h3>
                    <a th:href="@{/web/usuarios/nuevo}" class="btn btn-light">
                        <i class="fas fa-plus"></i> Nuevo Usuario
                    </a>
                </div>
            </div>
            
            <div class="card-body">
                <!-- Barra de búsqueda -->
                <form method="get" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="busqueda" class="form-control" 
                               placeholder="Buscar por nombre o email..." 
                               th:value="${busqueda}">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-search"></i> Buscar
                        </button>
                        <a th:href="@{/web/usuarios}" class="btn btn-secondary">
                            <i class="fas fa-sync"></i> Limpiar
                        </a>
                    </div>
                </form>

                <!-- Tabla de usuarios -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Foto</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Fecha Registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${usuarios}">
                                <td th:text="${usuario.id}">1</td>
                                <td>
                                    <img th:if="${usuario.foto}" th:src="@{/uploads/{foto}(foto=${usuario.foto})}" 
                                         width="40" height="40" class="rounded-circle">
                                    <i th:unless="${usuario.foto}" class="fas fa-user-circle fa-2x text-secondary"></i>
                                </td>
                                <td th:text="${usuario.nombre}">David</td>
                                <td th:text="${usuario.email}">david@email.com</td>
                                <td>
                                    <span th:if="${usuario.rol == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                                    <span th:if="${usuario.rol == 'USER'}" class="badge bg-secondary">USER</span>
                                </td>
                                <td th:text="${#temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/web/usuarios/editar/{id}(id=${usuario.id})}" 
                                       class="btn btn-sm btn-warning">
                                        <i class="fas fa-edit"></i> Editar
                                    </a>
                                    <a th:href="@{/web/usuarios/eliminar/{id}(id=${usuario.id})}" 
                                       class="btn btn-sm btn-danger" 
                                       onclick="return confirm('¿Eliminar este usuario?')">
                                        <i class="fas fa-trash"></i> Eliminar
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${usuarios.empty}">
                                <td colspan="7" class="text-center">
                                    No hay usuarios registrados
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <nav th:if="${totalPaginas > 0}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${paginaActual == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{?pagina=1&busqueda=${busqueda}}">Primera</a>
                        </li>
                        <li class="page-item" th:classappend="${paginaActual == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{?pagina=${paginaActual-1}&busqueda=${busqueda}}">Anterior</a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link" th:text="'Página ' + ${paginaActual} + ' de ' + ${totalPaginas}"></span>
                        </li>
                        <li class="page-item" th:classappend="${paginaActual == totalPaginas} ? 'disabled'">
                            <a class="page-link" th:href="@{?pagina=${paginaActual+1}&busqueda=${busqueda}}">Siguiente</a>
                        </li>
                        <li class="page-item" th:classappend="${paginaActual == totalPaginas} ? 'disabled'">
                            <a class="page-link" th:href="@{?pagina=${totalPaginas}&busqueda=${busqueda}}">Última</a>
                        </li>
                    </ul>
                </nav>
                
                <div class="text-muted mt-2">
                    Total de usuarios: <strong th:text="${totalUsuarios}">0</strong>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
