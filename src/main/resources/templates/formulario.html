<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0"><i class="fas fa-user"></i> <span th:text="${titulo}"></span></h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/web/usuarios/guardar}" th:object="${usuario}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label">Nombre:</label>
                                <input type="text" th:field="*{nombre}" class="form-control" 
                                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" 
                                     th:errors="*{nombre}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email:</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" 
                                     th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Rol:</label>
                                <select th:field="*{rol}" class="form-select">
                                    <option value="USER">Usuario Normal</option>
                                    <option value="ADMIN">Administrador</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Foto de perfil:</label>
                                <input type="file" name="archivo" class="form-control" accept="image/*">
                                <small class="text-muted">Formatos permitidos: JPG, PNG, GIF (máx 5MB)</small>
                                
                                <!-- Mostrar foto actual si existe -->
                                <div th:if="${usuario.foto}" class="mt-2">
                                    <img th:src="@{/uploads/{foto}(foto=${usuario.foto})}" 
                                         width="80" height="80" class="rounded-circle">
                                    <span class="text-muted">Foto actual</span>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/web/usuarios}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
